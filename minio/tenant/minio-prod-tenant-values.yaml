######## minio-prod-tenant-values.yaml

tenant:
  tenant:
    name: minio-prod
    image:
      repository: quay.io/minio/minio
      tag: RELEASE.2025-04-08T15-41-24Z
      pullPolicy: IfNotPresent

    # Use an existing secret that contains config.env with root credentials.
    configSecret:
      name: minio-root-user
      accessKey: minioadmin
      secretKey: minioadmin123

    pools:
      - name: pool-0
        servers: 2
        volumesPerServer: 2
        size: 250Gi
        storageClassName: minio-gp3-retain

        # Production resource requests: adjust after load testing.
        resources:
          requests:
            cpu: "1000m"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 4Gi

        # Spread MinIO pods across nodes.
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: v1.min.io/tenant
                      operator: In
                      values:
                        - minio-prod
                topologyKey: kubernetes.io/hostname

    mountPath: /export

    requestAutoCert: true

    exposeServices:
      minio: false
      console: true

    serviceMetadata:
      minioServiceLabels: {}
      minioServiceAnnotations: {}
      consoleServiceLabels: {}
      consoleServiceAnnotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-internal: "true"

    users: []

    podManagementPolicy: Parallel

    env:
      - name: MINIO_BROWSER
        value: "on"

    # Optional but recommended when you integrate identity provider later.
    # oidc: {}

    # Optional: configure Prometheus scraping depending on your monitoring stack.
    # prometheusOperator: true
